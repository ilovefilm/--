<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เลือกสถานะ - THE ONE HOUSE 3</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Kanit', sans-serif; }

        body {
            height: 100vh;
            width: 100%;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            /* ใช้รูปพื้นหลังเดียวกับในดีไซน์ */
            background-image: url("ch7.jpg");
            background-size: cover;
            background-position: center;
        }

        /* คอนเทนเนอร์หลัก */
        .container {
            position: relative;
            z-index: 10;
            text-align: center;
            width: 100%;
            max-width: 1200px;
        }

        /* หัวข้อตามภาพ Mockup */
        .logo {
            font-size: 3.5rem;
            color: #fff;
            font-weight: 800;
            margin-bottom: 5px;
            /* เพิ่มเงาขอบสีดำให้ดูคมชัดตามรูป */
            text-shadow: 0 0 15px rgba(0,0,0,0.8), 0 0 30px rgba(0,0,0,0.5);
            letter-spacing: 2px;
        }

        .subtitle {
            font-size: 1rem;
            color: #fff;
            margin-bottom: 60px;
            font-weight: 500;
            text-shadow: 0 2px 5px rgba(0,0,0,0.5);
        }

        /* Grid แบ่ง 3 ส่วน */
        .role-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 30px;
            padding: 0 50px;
        }

        /* การ์ดสไตล์กระจกฝ้าตามภาพ */
        .role-card {
            background: rgba(255, 255, 255, 0.15); /* โปร่งแสงมาก */
            backdrop-filter: blur(20px); /* เอฟเฟกต์ฝ้าชัดๆ */
            -webkit-backdrop-filter: blur(20px);
            padding: 60px 20px;
            border-radius: 20px;
            cursor: pointer;
            transition: 0.4s;
            text-decoration: none;
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .role-card:hover {
            transform: translateY(-10px);
            background: rgba(255, 255, 255, 0.25);
            border-color: rgba(255, 255, 255, 0.4);
        }

        /* ไอคอนสีดำตามรูป Mockup */
        .role-icon {
            font-size: 4rem;
            color: #000; /* เปลี่ยนเป็นสีดำตามดีไซน์ของคุณ */
            margin-bottom: 25px;
            filter: drop-shadow(0 2px 5px rgba(0,0,0,0.2));
        }

        .role-title {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 8px;
            color: #000; /* ตัวหนังสือหัวข้อสีดำตามรูป */
        }

        .role-desc {
            font-size: 0.8rem;
            color: #000; /* คำอธิบายสีดำตามรูป */
            font-weight: 500;
            line-height: 1.4;
            opacity: 0.8;
        }

        /* ปุ่มกลับหน้าหลัก */
        .back-home {
            position: absolute;
            top: 40px;
            left: 50px;
            color: white;
            text-decoration: none;
            font-size: 1rem;
            display: flex;
            align-items: center;
            gap: 10px;
            z-index: 20;
            background: rgba(0,0,0,0.3);
            padding: 8px 20px;
            border-radius: 30px;
            transition: 0.3s;
        }
        .back-home:hover { background: rgba(0,0,0,0.6); }

        @media (max-width: 900px) {
            .role-grid { grid-template-columns: 1fr; gap: 20px; padding: 0 20px; }
            .role-card { padding: 40px 20px; }
            .logo { font-size: 2.5rem; }
        }
    </style>
</head>
<body>

    <a href="index.html" class="back-home"><i class="fas fa-arrow-left"></i> กลับหน้าหลัก</a>

    <div class="container">
        <h1 class="logo">THE ONE HOUSE 3</h1>
        <p class="subtitle">กรุณาเลือกสถานะของคุณเพื่อเข้าสู่ระบบ</p>

        <div class="role-grid">
            <a href="login_owner.html" class="role-card">
                <i class="fas fa-user-tie role-icon"></i>
                <div class="role-title">เจ้าของหอพัก</div>
                <div class="role-desc">สำหรับผู้ดูแลระบบ จัดการห้องพัก</div>
            </a>

            <a href="login_tenant.html" class="role-card">
                <i class="fas fa-key role-icon"></i>
                <div class="role-title">ผู้เช่าปัจจุบัน</div>
                <div class="role-desc">สำหรับ ผู้เช่า ดูบิล , แจ้งซ่อมฯ</div>
            </a>

            <a href="login_guest.html" class="role-card">
                <i class="fas fa-calendar-check role-icon"></i>
                <div class="role-title">ผู้สนใจจองห้อง</div>
                <div class="role-desc">สำหรับผู้สนใจ ดูห้องว่าง, จองห้องพัก</div>
            </a>
        </div>
    </div>

</body>
</html>
