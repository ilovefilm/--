<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guest Login - The One House 3</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Kanit', sans-serif; }
        
        body {
            height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center;
            background-image: url("ch7.jpg"); 
            background-size: cover; background-position: center; position: relative;
        }

        /* Overlay สีดำจางๆ ทับรูปพื้นหลัง */
        body::before { 
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0, 0, 0, 0.45); z-index: 1; 
        }
        
        .page-title {
            position: relative; z-index: 2; color: #fff; font-size: 2.2rem; font-weight: 800;
            letter-spacing: 2px; margin-bottom: 25px; text-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        /* กล่องกระจกฝ้า (Glassmorphism) */
        .glass-card {
            position: relative; z-index: 2; width: 90%; max-width: 420px;
            background: rgba(255, 255, 255, 0.15); 
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); 
            border: 1px solid rgba(255, 255, 255, 0.3); border-radius: 25px;
            padding: 45px 35px; box-shadow: 0 15px 45px rgba(0,0,0,0.4);
            text-align: center;
        }

        .login-intro { color: rgba(255, 255, 255, 0.9); font-size: 1.1rem; margin-bottom: 35px; font-weight: 400; }

        .btn-social-full {
            width: 100%;
            padding: 16px;
            border-radius: 15px;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            margin-bottom: 18px;
            text-decoration: none; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .btn-google { background: #ffffff; color: #444; }
        .btn-google:hover { background: #f1f1f1; transform: translateY(-3px); }

        .btn-facebook { background: #1877F2; color: #ffffff; }
        .btn-facebook:hover { background: #166fe5; transform: translateY(-3px); }

        .btn-google img { width: 22px; height: 22px; }
        .btn-facebook i { font-size: 1.4rem; }

        .back-link { 
            display: inline-block; color: rgba(255,255,255,0.6); text-decoration: none; 
            margin-top: 25px; font-size: 0.95rem; transition: 0.3s;
        }
        .back-link:hover { color: #fff; transform: translateX(-5px); }

        .footer-note {
            margin-top: 30px; color: rgba(255,255,255,0.4); font-size: 0.8rem; line-height: 1.4;
        }
    </style>
</head>
<body>

    <h1 class="page-title">THE ONE HOUSE 3</h1>
    
    <div class="glass-card">
        <p class="login-intro">กรุณาเลือกช่องทางเข้าสู่ระบบเพื่อจองห้องพัก</p>

        <a href="#" onclick="forceLogin('Google', 'sim_google.html')" class="btn-social-full btn-google">
            <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" alt="Google">
            เข้าสู่ระบบด้วย Google
        </a>

        <a href="#" onclick="forceLogin('Facebook', 'sim_facebook.html')" class="btn-social-full btn-facebook">
            <i class="fab fa-facebook-f"></i>
            เข้าสู่ระบบด้วย Facebook
        </a>

        <a href="select_role.html" class="back-link"><i class="fas fa-arrow-left"></i> ย้อนกลับหน้าเลือกสถานะ</a>

        <div class="footer-note">
            การเข้าสู่ระบบแสดงว่าคุณยอมรับเงื่อนไขการใช้บริการ<br>และการคุ้มครองข้อมูลส่วนบุคคล
        </div>
    </div>

    <script>
        function forceLogin(providerName, nextPage) {
            // 1. บังคับเซฟข้อมูลลงระบบ ทันทีที่กดปุ่ม!
            const userSession = { 
                name: providerName + " User", 
                email: "guest@example.com" 
            };
            localStorage.setItem('guest_user_session', JSON.stringify(userSession));
            
            // 2. หลังจากเซฟเสร็จ ค่อยสั่งให้เปลี่ยนหน้าเว็บ
            window.location.href = nextPage;
        }
    </script>
</body>
</html>
