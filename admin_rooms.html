<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>จัดการห้องพัก - THE ONE HOUSE 3</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
      :root { 
        --sidebar-bg: #000000; --sidebar-active: #2b2b2b; --text-color: #ffffff;
        --bg-body: #ffffff; --primary: #111111; --sidebar-width: 260px; 
      }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Kanit', sans-serif; }
        body { background-color: var(--bg-body); display: flex; min-height: 100vh; }
        
        /* --- Sidebar --- */
        .sidebar { width: var(--sidebar-width); background: var(--sidebar-bg); color: white; padding: 30px 20px; position: fixed; height: 100%; display: flex; flex-direction: column; z-index: 10; }
        .sidebar-brand { font-size: 1.5rem; font-weight: 800; color: #fff; margin-bottom: 30px; padding-left: 15px; letter-spacing: 0.5px; }
        .menu-item { display: flex; align-items: center; padding: 15px 20px; color: #ffffff; text-decoration: none; border-radius: 12px; margin-bottom: 8px; font-weight: 500; font-size: 1.1rem; transition: 0.2s; }
        .menu-item i { margin-right: 15px; width: 25px; font-size: 1.2rem; text-align: center; }
        .menu-item.active { background-color: var(--sidebar-active); color: white; font-weight: 600; }
        .mt-auto { margin-top: auto; }

        .main-content { margin-left: var(--sidebar-width); flex: 1; padding: 40px; }
        .header-section { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .search-input { padding: 10px 20px; border: 1px solid #ddd; border-radius: 30px; width: 300px; outline: none; transition: 0.3s; }
        .search-input:focus { border-color: #111; box-shadow: 0 0 10px rgba(0,0,0,0.05); }

        /* --- การ์ดห้องพัก --- */
        .room-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 30px; }
        .room-card { 
            background: white; border-radius: 15px; overflow: hidden; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.06); border: 1px solid #eee; 
            border-top: 6px solid #ccc; transition: 0.3s; display: flex; flex-direction: column;
        }
        .room-card:hover { transform: translateY(-8px); box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .room-card.empty { border-top-color: #81c784; }        
        .room-card.occupied { border-top-color: #e57373; }     

        .room-img-wrapper { width: 100%; height: 180px; background: #f0f0f0; overflow: hidden; cursor: pointer; }
        .room-img { width: 100%; height: 100%; object-fit: cover; transition: 0.5s; }
        .room-card:hover .room-img { transform: scale(1.1); }

        .room-body { padding: 20px; text-align: center; flex-grow: 1; }
        .room-title { font-size: 1.25rem; font-weight: 700; color: #222; margin-bottom: 15px; display: block; }
        .btn-edit-room { 
            padding: 10px 30px; border-radius: 10px; border: none; cursor: pointer; 
            background: #222; color: white; font-weight: 500; transition: 0.2s; 
        }
        .btn-edit-room:hover { background: #000; letter-spacing: 1px; }

        /* --- Modal แก้ไข --- */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.6); align-items: center; justify-content: center; backdrop-filter: blur(4px); }
        .modal-content { background: white; padding: 40px; border-radius: 20px; width: 90%; max-width: 600px; max-height: 90vh; overflow-y: auto; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 600; color: #333; }
        .form-control { width: 100%; padding: 14px; border: 1px solid #ddd; border-radius: 10px; font-size: 1rem; outline: none; }
        .form-control:focus { border-color: #111; }
        
        .img-upload-zone { 
            border: 2px dashed #bbb; padding: 30px; text-align: center; border-radius: 15px; 
            cursor: pointer; background: #fafafa; transition: 0.3s; color: #666;
        }
        .img-upload-zone:hover { border-color: #111; background: #f0f0f0; color: #111; }
        
        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 15px; margin-top: 20px; }
        .gallery-item { position: relative; width: 100%; height: 110px; border-radius: 10px; overflow: hidden; border: 1px solid #ddd; }
        .gallery-item img { width: 100%; height: 100%; object-fit: cover; }
        .btn-del-img { position: absolute; top: 5px; right: 5px; background: rgba(239, 83, 80, 0.9); color: white; border: none; width: 24px; height: 24px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 12px; }
        
        .modal-footer { display: flex; justify-content: flex-end; gap: 12px; margin-top: 30px; }
        .btn-modal { padding: 12px 25px; border-radius: 10px; border: none; cursor: pointer; font-weight: 600; transition: 0.2s; }
        .btn-save-data { background: #111; color: white; }
        .btn-save-data:hover { background: #333; }
        .btn-cancel-modal { background: #f0f0f0; color: #555; }
    </style>
</head>
<body>

    <nav class="sidebar">
        <div class="sidebar-brand">THE ONE HOUSE 3</div>
        <a href="admin_dashboard.html" class="menu-item"><i class="fas fa-home"></i> ภาพรวม </a>
        <a href="#" class="menu-item active"><i class="fas fa-bed"></i> จัดการห้องพัก</a>
        <a href="admin_booking.html" class="menu-item"><i class="fas fa-list-alt"></i> รายการจอง</a>
        <a href="admin_utilities.html" class="menu-item"><i class="fas fa-faucet"></i> ค่าน้ำ/ไฟ/เน็ต</a>
        <a href="admin_reports.html" class="menu-item"><i class="fas fa-tools"></i> รายการแจ้งซ่อม</a>
        <a href="index.html" class="menu-item mt-auto"><i class="fas fa-sign-out-alt"></i> ออกจากระบบ</a>
    </nav>

    <main class="main-content">
        <div class="header-section">
            <h2 style="color:var(--primary); font-size: 1.7rem; font-weight: 800;">จัดการห้องพัก (01-67)</h2>
            <input type="text" id="searchInput" class="search-input" placeholder="พิมพ์เลขห้องเพื่อค้นหา..." onkeyup="filterRooms()">
        </div>
        <div class="room-grid" id="roomContainer"></div>
    </main>

    <div id="roomModal" class="modal">
        <div class="modal-content">
            <h3 style="margin-bottom:25px; font-size: 1.4rem;">แก้ไขข้อมูล <span id="displayRoomTitle" style="color:#2e7d32;"></span></h3>
            
            <div class="form-group">
                <label>สถานะการเข้าพัก</label>
                <select id="fieldStatus" class="form-control" onchange="checkStatusFields()">
                    <option value="empty">ว่าง </option>
                    <option value="occupied">ไม่ว่าง</option>
                </select>
            </div>

            <div id="occupantSection" style="display:none; padding:20px; background:#f8f9fa; border-radius:12px; margin-bottom:20px; border:1px solid #eee;">
                <div class="form-group">
                    <label>ชื่อผู้เช่าปัจจุบัน</label>
                    <input type="text" id="fieldName" class="form-control" placeholder="ชื่อ-นามสกุล">
                </div>
                <div class="form-group" style="margin-bottom:0;">
                    <label>เบอร์โทรติดต่อ (รหัสผ่าน)</label>
                    <input type="text" id="fieldPhone" class="form-control" placeholder="เช่น 0812345678">
                </div>
            </div>

            <div class="form-group">
                <label>ราคาค่าเช่าต่อเดือน (บาท)</label>
                <input type="number" id="fieldPrice" class="form-control">
            </div>

            <div class="form-group">
                <label>รายละเอียดห้องพัก (โชว์ที่หน้าจอง)</label>
                <textarea id="fieldDesc" class="form-control" rows="4" placeholder="ระบุรายละเอียดห้อง เช่น สิ่งอำนวยความสะดวก กฎระเบียบ..."></textarea>
            </div>

            <div class="form-group">
                <label>รูปภาพห้องพัก (ใช้รูปแรกเป็นรูปหน้าปก)</label>
                <div class="img-upload-zone" onclick="document.getElementById('imgInput').click()">
                    <i class="fas fa-images" style="font-size:2rem; margin-bottom:10px; display:block;"></i>
                    <span>คลิกเพื่อเลือกรูปภาพเพิ่ม</span>
                    <input type="file" id="imgInput" multiple accept="image/*" style="display:none;" onchange="handleImageStream(this)">
                </div>
                <div class="gallery-grid" id="modalGallery"></div>
            </div>

            <div class="modal-footer">
                <button class="btn-modal btn-cancel-modal" onclick="closeRoomModal()">ยกเลิก</button>
                <button class="btn-modal btn-save-data" onclick="saveRoomUpdates()">บันทึกการเปลี่ยนแปลง</button>
            </div>
        </div>
    </div>

    <script>
        let roomDataArray = [];
        let editingIndex = -1;
        let activeTempImages = [];
        const STAND_IMG = "https://images.unsplash.com/photo-1595526114035-0d45ed16cfbf?q=80&w=2070";

        function loadInitialRooms() {
            const saved = localStorage.getItem('admin_all_rooms');
            if(saved) {
                roomDataArray = JSON.parse(saved);
                if(roomDataArray.length !== 67) createDefaultRooms();
            } else {
                createDefaultRooms();
            }
            displayRoomsGrid();
        }

        function createDefaultRooms() {
            roomDataArray = [];
            for(let i=1; i<=67; i++) {
                roomDataArray.push({
                    id: String(i).padStart(2, '0'),
                    status: 'empty',
                    tenant: '-',
                    tenantPhone: '',
                    price: 3500,
                    desc: "ห้องมาตรฐาน เฟอร์นิเจอร์ครบ แอร์ ทีวี ตู้เย็น พร้อมเข้าอยู่",
                    images: []
                });
            }
            syncStorage();
        }
function displayRoomsGrid() {
            const container = document.getElementById('roomContainer');
            container.innerHTML = '';
            roomDataArray.forEach((room, idx) => {
                // ดึงรูปแรกมาทำหน้าปก ถ้าไม่มีให้ใช้รูปมาตรฐาน
                const coverImg = (room.images && room.images.length > 0) ? room.images[0] : STAND_IMG;
                
                // กำหนดตัวแปรสำหรับป้ายสถานะ
                const statusText = room.status === 'occupied' ? 'ไม่ว่าง' : 'ว่าง';
                const statusClass = room.status === 'occupied' ? 'bg-red' : 'bg-green';
                const badgeStyle = room.status === 'occupied' 
                    ? 'background: #ef5350; color: white;' 
                    : 'background: #4caf50; color: white;';

                container.innerHTML += `
                    <div class="room-card ${room.status}">
                        <div class="room-img-wrapper" onclick="openEditView(${idx})" style="position: relative;">
                            <div style="position: absolute; top: 10px; right: 10px; padding: 5px 12px; border-radius: 20px; font-size: 0.8rem; font-weight: 600; z-index: 5; ${badgeStyle}">
                                ${statusText}
                            </div>
                            <img src="${coverImg}" class="room-img">
                        </div>
                        <div class="room-body">
                            <span class="room-title">Room ${room.id}</span>
                            <button class="btn-edit-room" onclick="openEditView(${idx})">แก้ไขข้อมูล</button>
                        </div>
                    </div>
                `;
            });
        }

        function openEditView(idx) {
            editingIndex = idx;
            const room = roomDataArray[idx];
            document.getElementById('displayRoomTitle').innerText = "Room " + room.id;
            document.getElementById('fieldStatus').value = room.status;
            document.getElementById('fieldName').value = (room.tenant === '-' ? '' : room.tenant);
            document.getElementById('fieldPhone').value = room.tenantPhone;
            document.getElementById('fieldPrice').value = room.price;
            document.getElementById('fieldDesc').value = room.desc || "";
            activeTempImages = room.images ? [...room.images] : [];
            
            refreshModalGallery();
            checkStatusFields();
            document.getElementById('roomModal').style.display = 'flex';
        }

        function checkStatusFields() {
            const status = document.getElementById('fieldStatus').value;
            document.getElementById('occupantSection').style.display = (status === 'occupied' ? 'block' : 'none');
        }

        function handleImageStream(input) {
            if(input.files) {
                Array.from(input.files).forEach(file => {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        // บีบอัดรูปภาพก่อนเก็บ (0.7 quality)
                        const img = new Image();
                        img.src = e.target.result;
                        img.onload = () => {
                            const canvas = document.createElement('canvas');
                            const maxW = 800;
                            let w = img.width;
                            let h = img.height;
                            if(w > maxW) { h *= maxW/w; w = maxW; }
                            canvas.width = w; canvas.height = h;
                            canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                            activeTempImages.push(canvas.toDataURL('image/jpeg', 0.7));
                            refreshModalGallery();
                        }
                    };
                    reader.readAsDataURL(file);
                });
            }
            input.value = '';
        }

        function refreshModalGallery() {
            const container = document.getElementById('modalGallery');
            container.innerHTML = '';
            activeTempImages.forEach((src, i) => {
                container.innerHTML += `
                    <div class="gallery-item">
                        <img src="${src}">
                        <button class="btn-del-img" onclick="deleteFromTemp(${i})"><i class="fas fa-times"></i></button>
                    </div>
                `;
            });
        }

        function deleteFromTemp(i) { activeTempImages.splice(i, 1); refreshModalGallery(); }

        function saveRoomUpdates() {
            if (editingIndex === -1) return;

            const room = roomDataArray[editingIndex];
            room.status = document.getElementById('fieldStatus').value;
            room.price = document.getElementById('fieldPrice').value;
            room.desc = document.getElementById('fieldDesc').value;
            
            if (room.status === 'occupied') {
                room.tenant = document.getElementById('fieldName').value || "-";
                room.tenantPhone = document.getElementById('fieldPhone').value || "";
            } else {
                room.tenant = "-";
                room.tenantPhone = "";
            }
            
            room.images = activeTempImages;
            
            syncStorage();
            displayRoomsGrid();
            closeRoomModal();
            alert("✅ บันทึกข้อมูลเรียบร้อย! ข้อมูลซิงค์กับหน้าจองแล้วครับ");
        }

        function syncStorage() { localStorage.setItem('admin_all_rooms', JSON.stringify(roomDataArray)); }
        function closeRoomModal() { document.getElementById('roomModal').style.display = 'none'; }
        
        function filterRooms() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            document.querySelectorAll('.room-card').forEach(card => {
                const text = card.innerText.toLowerCase();
                card.style.display = text.includes(query) ? 'flex' : 'none';
            });
        }

        window.onclick = (e) => { if(e.target.className === 'modal') closeRoomModal(); }
        loadInitialRooms();
    </script>
</body>
</html>
