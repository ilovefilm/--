<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign in - Google Accounts</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            background-color: #f0f2f5;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; margin: 0;
        }
        .container {
            background: white; width: 450px; padding: 48px 40px 36px;
            border-radius: 8px; border: 1px solid #dadce0;
            text-align: center;
        }
        .logo { width: 75px; margin-bottom: 10px; }
        h1 { font-size: 24px; font-weight: 400; margin: 0 0 10px; color: #202124; }
        p { font-size: 16px; color: #202124; margin-bottom: 40px; }
        
        .account-item {
            display: flex; align-items: center; padding: 12px 15px;
            border-bottom: 1px solid #e0e0e0; cursor: pointer; text-align: left;
            border-radius: 5px; transition: 0.2s;
        }
        .account-item:hover { background-color: #f5f5f5; }
        .avatar {
            width: 32px; height: 32px; border-radius: 50%; background-color: #8c6e54;
            color: white; display: flex; justify-content: center; align-items: center;
            margin-right: 15px; font-weight: bold;
        }
        .info div:first-child { font-weight: 500; color: #3c4043; font-size: 14px; }
        .info div:last-child { font-size: 12px; color: #5f6368; }
    </style>
</head>
<body>
    <div class="container">
        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/c/c1/Google_%22G%22_logo.svg/768px-Google_%22G%22_logo.svg.png" class="logo">
        <h1>ลงชื่อเข้าใช้ด้วย Google</h1>
        <p>เพื่อดำเนินการต่อใน The One House 3</p>

        <div class="account-item" onclick="loginSuccess()">
            <div class="avatar">G</div>
            <div class="info">
                <div>Guest User</div>
                <div>guest@example.com</div>
            </div>
        </div>
        
        <div class="account-item" onclick="loginSuccess()">
            <div class="avatar" style="background-color: purple;">U</div>
            <div class="info">
                <div>ใช้บัญชีอื่น</div>
                <div></div>
            </div>
        </div>
    </div>

    <script>
        function loginSuccess() {
            // จำลองการโหลดแป๊บนึง
            document.body.style.cursor = 'wait';
            setTimeout(() => {
                window.location.href = 'booking.html'; // ส่งกลับไปหน้าจอง
            }, 800);
        }
    </script>
</body>
</html>
