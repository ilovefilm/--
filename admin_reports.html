<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>รายการแจ้งซ่อม - The One House 3</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { 
            --sidebar-bg: #000000; --sidebar-active: #2b2b2b; --text-color: #ffffff;
            --bg-body: #ffffff; --primary: #111111; --sidebar-width: 260px; 
            --secondary: #555555;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Kanit', sans-serif; }
        body { background-color: var(--bg-body); display: flex; min-height: 100vh; }
        
        /* --- Sidebar (ดีไซน์ใหม่) --- */
        .sidebar { 
            width: var(--sidebar-width); 
            background: var(--sidebar-bg); 
            color: white; 
            padding: 30px 20px; 
            position: fixed; 
            height: 100%; 
            display: flex; 
            flex-direction: column; 
            z-index: 10; 
        }
        .sidebar-brand { 
            font-size: 1.5rem; 
            font-weight: 800; 
            color: #fff; 
            margin-bottom: 30px; 
            padding-left: 15px; 
            letter-spacing: 0.5px; 
        }
        .menu-item { 
            display: flex; 
            align-items: center; 
            padding: 15px 20px; 
            color: #ffffff; 
            text-decoration: none; 
            border-radius: 12px; 
            margin-bottom: 8px; 
            font-weight: 500; 
            font-size: 1.1rem; 
            transition: 0.2s; 
        }
        .menu-item i { 
            margin-right: 15px; 
            width: 25px; 
            font-size: 1.2rem; 
            text-align: center; 
        }
        .menu-item.active { 
            background-color: var(--sidebar-active); 
            color: white; 
            font-weight: 600; 
        }
        .menu-item:hover:not(.active) { 
            background-color: rgba(255,255,255,0.08); 
        }
        .mt-auto { margin-top: auto; }

        /* --- Main Content --- */
        .main-content { margin-left: var(--sidebar-width); flex: 1; padding: 40px; }

        /* Report Card Styling */
        .report-card { 
            background: white; padding: 25px; border-radius: 12px; 
            margin-bottom: 20px; border-left: 5px solid #ccc; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.05); 
            transition: 0.3s; border: 1px solid #eee;
        }
        .report-card:hover { transform: translateY(-2px); box-shadow: 0 6px 15px rgba(0,0,0,0.1); }
        
        .report-card.pending { border-left: 6px solid #ef5350; } 
        .report-card.done { border-left: 6px solid #4caf50; }  
        
        .report-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 15px; }
        .report-title { font-size: 1.1rem; font-weight: 600; color: var(--primary); }
        .report-date { color: #888; font-size: 0.85rem; margin-top: 5px; }
        
        .report-img { 
            max-width: 150px; border-radius: 8px; margin-top: 15px; 
            border: 1px solid #ddd; cursor: pointer; transition: 0.2s;
        }
        .report-img:hover { opacity: 0.9; transform: scale(1.02); }
        
        .btn-status { 
            background: #ef5350; color: white; border: none; padding: 8px 18px; 
            border-radius: 30px; cursor: pointer; font-size: 0.85rem; font-weight: bold;
            transition: 0.2s;
        }
        .btn-status:hover { background: #d32f2f; }
        
        .status-done { 
            color: #2e7d32; font-weight: 600; display: flex; align-items: center; gap: 8px; 
            background: #e8f5e9; padding: 6px 15px; border-radius: 20px; font-size: 0.9rem;
        }

        /* --- ส่วนตอบกลับ (Reply Section) --- */
        .reply-section {
            margin-top: 20px; padding-top: 15px; border-top: 1px dashed #ddd;
            background: #fafafa; padding: 15px; border-radius: 8px;
        }
        .reply-label { font-size: 0.9rem; color: #333; font-weight: 600; margin-bottom: 8px; display: block; }
        
        .reply-input {
            width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px;
            font-family: 'Kanit', sans-serif; resize: vertical; min-height: 70px;
            background: #fff;
        }
        .reply-input:focus { outline: none; border-color: var(--primary); }
        
        .btn-reply {
            background: var(--primary); color: white; border: none; padding: 10px 20px; 
            border-radius: 8px; margin-top: 10px; cursor: pointer; font-size: 0.9rem; font-weight: bold;
            transition: 0.2s;
        }
        .btn-reply:hover { background: #333; }
        
        .reply-display { 
            color: #555; font-style: italic; background: #fff; 
            padding: 15px; border-radius: 6px; margin-top: 5px; 
            border-left: 3px solid var(--primary); box-shadow: 0 2px 5px rgba(0,0,0,0.02);
        }

        .btn-clear {
            color: #d32f2f; border: 1px solid #ef5350; background: #fff8f8; 
            padding: 10px 20px; border-radius: 8px; cursor: pointer; 
            font-size: 0.95rem; transition: 0.2s; display: flex; align-items: center; gap: 8px;
        }
        .btn-clear:hover { background: #ef5350; color: white; }

        /* Modal ซูมรูป */
        #imageZoomModal { display: none; position: fixed; z-index: 10000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.9); align-items: center; justify-content: center; }
        #imageZoomModal img { max-width: 90%; max-height: 90vh; border-radius: 10px; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        .close-zoom { position: absolute; top: 20px; right: 30px; color: white; font-size: 2.5rem; cursor: pointer; font-weight: bold; }

    </style>
</head>
<body>

    <nav class="sidebar">
        <div class="sidebar-brand">THE ONE HOUSE 3</div>
        <a href="admin_dashboard.html" class="menu-item"><i class="fas fa-home"></i> ภาพรวม </a>
        <a href="admin_rooms.html" class="menu-item"><i class="fas fa-bed"></i> จัดการห้องพัก </a>
        <a href="admin_booking.html" class="menu-item"><i class="fas fa-list-alt"></i> รายการจอง </a>
        <a href="admin_utilities.html" class="menu-item"><i class="fas fa-faucet"></i> ค่าน้ำ/ไฟ/เน็ต </a>
        <a href="#" class="menu-item active"><i class="fas fa-tools"></i> รายการแจ้งซ่อม </a>
        <a href="index.html" class="menu-item mt-auto"><i class="fas fa-sign-out-alt"></i> ออกจากระบบ </a>
    </nav>

    <main class="main-content">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:30px;">
            <h2 style="color:var(--primary); font-size: 1.6rem; font-weight: 600;">รายการแจ้งซ่อม & ตอบกลับ</h2>
            <button onclick="clearAll()" class="btn-clear"><i class="fas fa-trash-alt"></i> ล้างข้อมูลทั้งหมด</button>
        </div>
        
        <div id="container"></div>
    </main>

    <div id="imageZoomModal" onclick="this.style.display='none'">
        <span class="close-zoom">&times;</span>
        <img id="zoomedImage" src="">
    </div>

    <script>
        let reports = JSON.parse(localStorage.getItem('admin_reports')) || [];
        const container = document.getElementById('container');

        function render() {
            container.innerHTML = '';
            if(reports.length === 0) {
                container.innerHTML = `
                    <div style="text-align:center; color:#999; margin-top:80px;">
                        <i class="fas fa-clipboard-check" style="font-size: 4rem; margin-bottom: 15px; opacity: 0.3;"></i>
                        <p style="font-size:1.1rem;">ไม่มีรายการแจ้งซ่อมขณะนี้</p>
                    </div>`;
                return;
            }

            reports.reverse().forEach((r, reversedIndex) => {
                let i = reports.length - 1 - reversedIndex; // หา index จริง

                const statusBtn = r.status === 'pending' 
                    ? `<button class="btn-status" onclick="markDone(${i})"><i class="fas fa-wrench"></i> เปลี่ยนเป็นซ่อมเสร็จสิ้น</button>` 
                    : `<div class="status-done"><i class="fas fa-check-circle"></i> ดำเนินการเสร็จสิ้นแล้ว</div>`;

                const imgHTML = r.image ? `<br><img src="${r.image}" class="report-img" onclick="zoomImage(this.src)" title="คลิกเพื่อขยาย">` : '';
                
                let replyHTML = '';
                if (r.reply) {
                    replyHTML = `
                        <div class="reply-section">
                            <span class="reply-label"><i class="fas fa-comment-dots"></i> แอดมินตอบกลับแล้ว:</span>
                            <div class="reply-display">"${r.reply}"</div>
                            <button onclick="editReply(${i})" style="font-size:0.85rem; color:#888; background:none; border:none; cursor:pointer; margin-top:8px; text-decoration:underline;">แก้ไขข้อความตอบกลับ</button>
                        </div>
                    `;
                } else {
                    replyHTML = `
                        <div class="reply-section">
                            <label class="reply-label">พิมพ์ตอบกลับผู้เช่าห้อง ${r.room}:</label>
                            <textarea id="reply-box-${i}" class="reply-input" placeholder="เช่น รับทราบครับ ช่างจะเข้าไปซ่อมพรุ่งนี้ช่วงบ่าย..."></textarea>
                            <button class="btn-reply" onclick="sendReply(${i})"><i class="fas fa-paper-plane"></i> ส่งข้อความ</button>
                        </div>
                    `;
                }

                container.innerHTML += `
                <div class="report-card ${r.status}">
                    <div class="report-header">
                        <div>
                            <div class="report-title">
                                <i class="fas fa-door-closed" style="color:#555;"></i> ห้อง ${r.room} : ${r.topic}
                            </div>
                            <div class="report-date"><i class="far fa-clock"></i> แจ้งเมื่อ: ${r.date}</div>
                        </div>
                        ${statusBtn}
                    </div>
                    <p style="color:#444; line-height:1.6; font-size: 0.95rem;">${r.detail}</p>
                    ${imgHTML}
                    ${replyHTML}
                </div>`;
            });
            // Reverse กลับเพื่อให้ข้อมูลจริงไม่พัง
            reports.reverse(); 
        }

        function markDone(index) {
            if(confirm('ยืนยันว่าช่างได้ดำเนินการซ่อมแซมเสร็จสิ้นแล้วใช่หรือไม่?')) {
                reports[index].status = 'done';
                saveAndRender();
            }
        }

        function sendReply(index) {
            const text = document.getElementById(`reply-box-${index}`).value;
            if(text.trim() === "") { alert('กรุณาพิมพ์ข้อความก่อนกดส่งครับ'); return; }
            
            reports[index].reply = text; 
            saveAndRender();
            alert('ส่งข้อความตอบกลับไปยังผู้เช่าเรียบร้อยแล้ว');
        }

        function editReply(index) {
            if(confirm('คุณต้องการลบข้อความตอบกลับเดิมเพื่อเขียนใหม่ใช่หรือไม่?')) {
                delete reports[index].reply;
                saveAndRender();
            }
        }

        function clearAll() {
            if(confirm('⚠️ คำเตือน: คุณต้องการลบประวัติการแจ้งซ่อม "ทั้งหมด" ทิ้งใช่หรือไม่? (การกระทำนี้ไม่สามารถย้อนกลับได้)')) {
                localStorage.removeItem('admin_reports');
                reports = [];
                render();
            }
        }

        function saveAndRender() {
            localStorage.setItem('admin_reports', JSON.stringify(reports));
            render();
        }

        function zoomImage(src) {
            document.getElementById('zoomedImage').src = src;
            document.getElementById('imageZoomModal').style.display = 'flex';
        }

        window.onload = render;
    </script>
</body>
</html>
